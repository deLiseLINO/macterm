name: macOS Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build macOS artifacts
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: jdx/mise-action@v4

      # ISO week (YYYY-Www) — makes the GhosttyKit cache self-refresh weekly.
      - name: Cache epoch
        id: epoch
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache GhosttyKit
        uses: actions/cache@v6
        with:
          path: |
            GhosttyKit.xcframework
            Macterm/Resources/ghostty
            Macterm/Resources/terminfo
            Macterm/Resources/zmx
          key: ghosttykit-${{ hashFiles('scripts/setup.sh') }}-${{ steps.epoch.outputs.week }}

      - name: Setup GhosttyKit
        run: mise run setup --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CI artifacts
        run: |
          VERSION="0.0.${{ github.run_number }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: invalid numeric CI version '$VERSION'" >&2
            exit 1
          fi
          VERSION="$VERSION" ./scripts/build.sh

      - name: Verify packaged artifacts
        run: |
          set -euo pipefail
          if [[ ! -d build/export/Macterm.app ]]; then
            echo "error: build/export/Macterm.app is missing" >&2
            exit 1
          fi
          if ! compgen -G 'build/Macterm-*.dmg' >/dev/null; then
            echo "error: no build/Macterm-*.dmg was produced" >&2
            exit 1
          fi
          codesign --verify --deep --strict build/export/Macterm.app
          hdiutil imageinfo build/Macterm-*.dmg >/dev/null

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macterm-app
          path: build/export/
          if-no-files-found: error
          retention-days: 14

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macterm-dmg
          path: build/Macterm-*.dmg
          if-no-files-found: error
          retention-days: 14
